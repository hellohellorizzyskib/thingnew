<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Williamedia</title>
    <style>
        :root {
            --bg-light: white;
            --text-light: #333;
            --modal-bg-light: rgba(0, 0, 0, 0.1);
            --modal-border-light: rgba(0, 0, 0, 0.2);
            --bg-dark: #333;
            --text-dark: #ccc;
            --modal-bg-dark: rgba(255, 255, 255, 0.1);
            --modal-border-dark: rgba(255, 255, 255, 0.2);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            padding-top: 15vh;
            transition: background 0.3s, color 0.3s;
        }
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
        }
        body.dark .settings-btn {
            color: var(--text-dark);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: var(--modal-bg-light);
            border: 1px solid var(--modal-border-light);
            border-radius: 10px;
            padding: 20px;
            max-width: 300px;
            width: 90%;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        body.dark .modal-content {
            background: var(--modal-bg-dark);
            border: 1px solid var(--modal-border-dark);
        }
        .modal-content h2 {
            margin-top: 0;
            font-size: 1.5rem;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.5rem;
            cursor: pointer;
        }
        body.dark .close-btn {
            color: var(--text-dark);
        }
        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .toggle {
            position: relative;
            width: 50px;
            height: 24px;
            background: #ccc;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle.active {
            background: #666;
        }
        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle.active .toggle-slider {
            transform: translateX(26px);
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .get-started-btn,
        .login-btn {
            margin-top: 30px;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .get-started-btn {
            background: var(--text-light);
            color: var(--bg-light);
            border: none;
        }
        .login-btn {
            margin-left: 12px;
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--text-light);
        }
        body.dark .get-started-btn {
            background: var(--text-dark);
            color: var(--bg-dark);
        }
        body.dark .login-btn {
            color: var(--text-dark);
            border-color: var(--text-dark);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        body.dark h1 {
            text-shadow: 2px 2px 4px rgba(255,255,255,0.1);
        }
        p {
            font-size: 1.2rem;
            margin: 0;
            opacity: 0.9;
        }
    </style>
</head>
<body class="light">
    <button class="settings-btn" onclick="openModal()">&#9881;</button>
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>Settings</h2>
            <div class="toggle-container">
                <span>Dark Mode</span>
                <div class="toggle" id="themeToggle" onclick="toggleTheme()">
                    <div class="toggle-slider"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="main">
        <div class="container">
            <h1>Williamedia</h1>
            <p>Real people, Real posts, Real experiences</p>
            <a href="/signup" class="get-started-btn">Get Started</a>
            <a href="/login" class="login-btn">Login</a>
        </div>
    </div>
    <script>
        function openModal() {
            document.getElementById('settingsModal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('settingsModal').classList.remove('show');
        }
        function toggleTheme() {
            const body = document.body;
            const toggle = document.getElementById('themeToggle');
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
                toggle.classList.add('active');
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                toggle.classList.remove('active');
            }
        }
    </script>
</body>
</html>
