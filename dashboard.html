<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Williamedia Dashboard</title>
    <style>
        :root {
            --bg-light: white;
            --text-light: #333;
            --bg-dark: #333;
            --text-dark: #ccc;
            --modal-bg-light: rgba(0, 0, 0, 0.1);
            --modal-border-light: rgba(0, 0, 0, 0.2);
            --modal-bg-dark: rgba(255, 255, 255, 0.1);
            --modal-border-dark: rgba(255, 255, 255, 0.2);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg-light);
            color: var(--text-light);
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }
        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .title {
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon-btn,
        .profile-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-light);
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body.dark .icon-btn,
        body.dark .profile-btn {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-dark);
        }
        .icon-btn.square {
            width: 42px;
            height: 42px;
            font-size: 1.1rem;
        }
        .icon-btn.logout {
            font-size: 1.2rem;
        }
        .profile-btn {
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.1rem;
        }
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 42px;
            height: 42px;
            border: none;
            background: rgba(255,255,255,0.9);
            color: var(--text-light);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }
        body.dark .settings-btn {
            background: rgba(255,255,255,0.1);
            color: var(--text-dark);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            width: min(320px, calc(100% - 40px));
            background: var(--modal-bg-light);
            border: 1px solid var(--modal-border-light);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.12);
            position: relative;
        }
        body.dark .modal-content {
            background: var(--modal-bg-dark);
            border: 1px solid var(--modal-border-dark);
        }
        .modal-content h2 {
            margin: 0 0 18px;
            font-size: 1.3rem;
        }
        .close-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            border: none;
            background: transparent;
            color: inherit;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle.active {
            background: #666;
        }
        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle.active .toggle-slider {
            transform: translateX(24px);
        }
        .content {
            margin-top: 40px;
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.85;
        }
        .feed {
            margin-top: 28px;
            display: grid;
            gap: 20px;
        }
        .post-card {
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        body.dark .post-card {
            background: rgba(40,40,40,0.88);
            border-color: rgba(255,255,255,0.12);
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .post-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #dde2ff;
            color: #3344aa;
            font-weight: 700;
            text-transform: uppercase;
        }
        .post-name {
            font-size: 1rem;
            font-weight: 700;
        }
        .post-username {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .post-meta {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .post-body {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 14px;
            white-space: pre-wrap;
        }
        .post-media {
            border-radius: 18px;
            overflow: hidden;
            background: #f5f5f5;
        }
        .post-media img,
        .post-media video {
            width: 100%;
            display: block;
            max-height: 520px;
            object-fit: cover;
        }
        .empty-feed {
            margin-top: 24px;
            padding: 18px;
            border: 1px dashed rgba(0,0,0,0.12);
            border-radius: 18px;
            text-align: center;
            color: rgba(0,0,0,0.65);
        }
    </style>
</head>
<body class="light">
    <button class="settings-btn" onclick="openModal()">&#9881;</button>
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>Settings</h2>
            <div class="toggle-container">
                <span>Dark Mode</span>
                <div class="toggle" id="themeToggle" onclick="toggleTheme()">
                    <div class="toggle-slider"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="page">
        <header class="header">
            <div>
                <div class="title">Williamedia</div>
                <div id="welcomeText" style="font-size:0.95rem; opacity:0.8; margin-top:4px;"></div>
            </div>
            <div class="actions">
                <button class="icon-btn square" onclick="goToCreatePost()">+</button>
                <button class="icon-btn logout" onclick="logout()">⎋</button>
                <button class="profile-btn">👤</button>
            </div>
        </header>
        <section class="content">
            <p>Welcome to your Williamedia dashboard. Use the top right controls to manage your experience, create new posts, or log out.</p>
        </section>
        <div class="feed" id="feedContainer"></div>
    </div>
    <script>
        function openModal() {
            document.getElementById('settingsModal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('settingsModal').classList.remove('show');
        }
        function toggleTheme() {
            const body = document.body;
            const toggle = document.getElementById('themeToggle');
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
                toggle.classList.add('active');
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                toggle.classList.remove('active');
            }
        }
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '/';
        }
        function goToCreatePost() {
            window.location.href = '/create-post';
        }
        function ensureSignedIn() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = '/login';
                return;
            }
            document.getElementById('welcomeText').textContent = `Signed in as ${user}`;
        }

        function renderPost(post) {
            const card = document.createElement('article');
            card.className = 'post-card';

            const header = document.createElement('div');
            header.className = 'post-header';

            const author = document.createElement('div');
            author.className = 'post-author';
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = post.username.slice(0, 2);
            const name = document.createElement('div');
            const title = document.createElement('div');
            title.className = 'post-name';
            title.textContent = post.nickname || post.username;
            const username = document.createElement('div');
            username.className = 'post-username';
            username.textContent = '@' + post.username;
            const meta = document.createElement('div');
            meta.className = 'post-meta';
            meta.textContent = new Date(post.createdAt).toLocaleString();
            name.appendChild(title);
            name.appendChild(username);
            name.appendChild(meta);
            author.appendChild(avatar);
            author.appendChild(name);

            header.appendChild(author);
            card.appendChild(header);

            if (post.content) {
                const body = document.createElement('div');
                body.className = 'post-body';
                body.textContent = post.content;
                card.appendChild(body);
            }

            if (post.mediaData) {
                const media = document.createElement('div');
                media.className = 'post-media';
                if (post.mediaType && post.mediaType.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = post.mediaData;
                    img.alt = 'Post image';
                    media.appendChild(img);
                } else if (post.mediaType && post.mediaType.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = post.mediaData;
                    video.controls = true;
                    media.appendChild(video);
                }
                card.appendChild(media);
            }

            return card;
        }

        let existingPostIds = new Set();

        function loadPosts(initial = false) {
            fetch('/posts')
                .then(response => response.json())
                .then(posts => {
                    const container = document.getElementById('feedContainer');
                    
                    if (initial) {
                        container.innerHTML = '';
                        existingPostIds.clear();
                    }
                    
                    if (!Array.isArray(posts) || posts.length === 0) {
                        if (initial) {
                            const empty = document.createElement('div');
                            empty.className = 'empty-feed';
                            empty.textContent = 'No posts yet. Create one by clicking the + button above.';
                            container.appendChild(empty);
                        }
                        return;
                    }
                    
                    // On initial load or if no posts exist yet
                    if (initial || existingPostIds.size === 0) {
                        container.innerHTML = '';
                        posts.forEach(post => {
                            container.appendChild(renderPost(post));
                            existingPostIds.add(post.id);
                        });
                        return;
                    }
                    
                    // Check for new posts
                    const newPosts = posts.filter(post => !existingPostIds.has(post.id));
                    
                    // Remove empty feed message if it exists
                    const emptyMessage = container.querySelector('.empty-feed');
                    if (emptyMessage) {
                        emptyMessage.remove();
                    }
                    
                    // Add new posts to the feed (prepend them)
                    newPosts.reverse().forEach(post => {
                        const card = renderPost(post);
                        container.insertBefore(card, container.firstChild);
                        existingPostIds.add(post.id);
                    });
                })
                .catch(() => {
                    if (initial) {
                        const container = document.getElementById('feedContainer');
                        container.innerHTML = '<div class="empty-feed">Unable to load posts. Try refreshing the page.</div>';
                    }
                });
        }

        function startPolling() {
            // Poll for new posts every 2 seconds
            setInterval(() => loadPosts(false), 2000);
        }

        ensureSignedIn();
        loadPosts(true);
        startPolling();
    </script>
</body>
</html>
